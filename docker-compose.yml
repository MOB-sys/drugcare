services:
  postgres:
    image: postgres:16-alpine
    container_name: yakmeogeo-db
    environment:
      POSTGRES_USER: yakmeogeo
      POSTGRES_PASSWORD: yakmeogeo_dev_2026!
      POSTGRES_DB: yakmeogeo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yakmeogeo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yakmeogeo-redis
    command: ["redis-server", "--requirepass", "yakmeogeo_redis_dev"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "yakmeogeo_redis_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: yakmeogeo-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

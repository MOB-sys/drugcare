name: yakmeogeo
description: "약먹어 — 약/영양제 상호작용 3초 체커"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  dio: ^5.4.0
  google_mobile_ads: ^5.0.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

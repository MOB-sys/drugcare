name: Daily Review Agent

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:

concurrency:
  group: daily-review
  cancel-in-progress: true

jobs:
  review:
    name: Daily Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install Dependencies
        run: cd src/web && npm ci

      # TypeScript 타입 체크
      - name: TypeScript Check
        run: cd src/web && npx tsc --noEmit

      # Vitest 단위 테스트
      - name: Unit Tests
        run: cd src/web && npx vitest run

      # 보안 검사
      - name: Security Check
        run: bash scripts/review/check-security.sh src/web

      # SEO 검사
      - name: SEO Check
        run: bash scripts/review/check-seo.sh src/web

      # 다크모드 검사
      - name: Dark Mode Check
        run: bash scripts/review/check-darkmode.sh src/web

      # 프로덕션 헤더/CSP 검증
      - name: Production Headers Check
        run: bash scripts/review/check-headers.sh https://pillright.com

      # 의존성 취약점
      - name: Security Audit
        run: cd src/web && npm audit --audit-level=high || true

      # 의존성 업데이트 확인
      - name: Outdated Dependencies
        run: |
          cd src/web
          echo "=== 업데이트 가능 패키지 ==="
          npm outdated 2>/dev/null || echo "모두 최신"

      # 복잡도 검사
      - name: Complexity Check
        run: bash scripts/review/check-complexity.sh src/backend src/web

      # 코드 중복 검사
      - name: Duplication Check
        run: bash scripts/review/check-duplication.sh src/backend src/web

      # 통합 품질 점수
      - name: Quality Score
        run: bash scripts/review/check-quality.sh . --report
        continue-on-error: true

      # 테스트 파일 통계
      - name: Test Statistics
        run: |
          WEB_TESTS=$(find src/web/src -name "*.test.*" | wc -l | xargs)
          echo "웹 테스트 파일: ${WEB_TESTS}개"

      # Lighthouse CI (프로덕션)
      - name: Lighthouse Production
        run: |
          npm install -g @lhci/cli
          lhci autorun \
            --collect.url=https://pillright.com/ \
            --collect.url=https://pillright.com/check \
            --collect.url=https://pillright.com/drugs \
            --collect.numberOfRuns=3 \
            --assert.assertions.categories:performance="warn;minScore=0.85" \
            --assert.assertions.categories:accessibility="warn;minScore=0.9" \
            --assert.assertions.categories:seo="warn;minScore=0.95" \
            --upload.target=temporary-public-storage
        continue-on-error: true

      # 실패 시 GitHub Issue 자동 생성
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Review Agent] 일간 리뷰 실패 - ${new Date().toISOString().split('T')[0]}`;
            // 같은 제목의 열린 이슈가 있으면 중복 생성 방지
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'review-agent',
              per_page: 10
            });
            const duplicate = issues.find(i => i.title === title);
            if (duplicate) {
              console.log(`이미 열린 이슈 존재: #${duplicate.number}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Review Agent 일간 리뷰 실패',
                '',
                `**날짜:** ${new Date().toISOString().split('T')[0]}`,
                `**워크플로우:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Actions 로그에서 실패 원인을 확인하세요.',
              ].join('\n'),
              labels: ['review-agent', 'quality']
            });

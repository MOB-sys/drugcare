name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'src/data/migrations/**'
      - 'scripts/data-import/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'pyproject.toml'

  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yakmeogeo
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: yakmeogeo_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://yakmeogeo:testpass@localhost:5432/yakmeogeo_test
      REDIS_URL: redis://localhost:6379/0
      TESTING: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.SERVER_PROJECT_DIR || '/opt/drugcare' }}

            echo "=== 코드 업데이트 ==="
            git stash --include-untracked 2>/dev/null || true
            git pull origin main

            echo "=== 배포 전 검증 ==="
            bash scripts/deploy/pre-deploy-check.sh docker-compose.prod.yml .env

            echo "=== Docker 이미지 빌드 ==="
            docker compose -f docker-compose.prod.yml build backend

            echo "=== DB 서비스 확인 ==="
            docker compose -f docker-compose.prod.yml up -d postgres redis
            sleep 5

            echo "=== Alembic 마이그레이션 ==="
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            echo "=== 서비스 재시작 ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Nginx DNS 갱신 (backend IP 변경 대응) ==="
            docker exec yakmeogeo-nginx nginx -s reload 2>/dev/null || true

            echo "=== 헬스체크 (DB+Redis 포함) ==="
            for i in $(seq 1 20); do
              HEALTH=$(curl -sf http://localhost/api/v1/health 2>/dev/null || echo "")
              if echo "$HEALTH" | grep -q '"status":"healthy"'; then
                echo "헬스체크 성공! DB·Redis 모두 정상"
                docker compose -f docker-compose.prod.yml ps
                exit 0
              fi
              # 부분 장애 감지 — degraded면 즉시 로그 출력
              if echo "$HEALTH" | grep -q '"status":"degraded"'; then
                echo "WARNING: 서비스 degraded 상태 감지"
                echo "$HEALTH" | python3 -m json.tool 2>/dev/null || echo "$HEALTH"
              fi
              echo "대기 중... ($i/20)"
              sleep 3
            done
            echo "ERROR: 헬스체크 실패 — 자동 롤백 시도"
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            # 롤백: 이전 이미지로 복원
            if docker image ls drugcare-backend --format '{{.ID}}' | tail -1 | grep -q .; then
              echo "이전 이미지로 롤백..."
              git stash
              docker compose -f docker-compose.prod.yml up -d backend
              docker compose -f docker-compose.prod.yml restart nginx
            fi
            exit 1
